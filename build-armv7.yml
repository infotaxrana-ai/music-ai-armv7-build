name: Build Music AI custom ARMv7 runtime

"on":
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: music-ai-armv7-${{ github.ref }}
  cancel-in-progress: false

env:
  ORT_VERSION: "1.24.3"
  SHERPA_VERSION: "1.13.3"
  ANDROID_API: "21"
  BUILD_JOBS: "2"

jobs:
  build-onnxruntime:
    name: Build custom ONNX Runtime
    runs-on: ubuntu-24.04
    timeout-minutes: 300

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Free runner storage
        shell: bash
        run: |
          set -euxo pipefail
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/lib/android/sdk/system-images
          sudo docker system prune --all --force || true
          sudo apt-get clean
          df -h

      - name: Install build tools
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            python3 \
            python3-pip \
            git \
            file \
            zip \
            unzip \
            jq

      - name: Build ONNX Runtime for armeabi-v7a
        shell: bash
        run: |
          chmod +x scripts/build_onnxruntime_armv7.sh
          scripts/build_onnxruntime_armv7.sh

      - name: Upload ONNX Runtime package
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-armv7-${{ github.run_id }}
          path: out/onnxruntime-armv7
          if-no-files-found: error
          compression-level: 6
          retention-days: 7

  build-sherpa:
    name: Build Sherpa and release package
    needs: build-onnxruntime
    runs-on: ubuntu-24.04
    timeout-minutes: 240

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Free runner storage
        shell: bash
        run: |
          set -euxo pipefail
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/lib/android/sdk/system-images
          sudo docker system prune --all --force || true
          sudo apt-get clean
          df -h

      - name: Install build tools
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            git \
            file \
            zip \
            unzip \
            jq

      - name: Download custom ONNX Runtime
        uses: actions/download-artifact@v5
        with:
          name: onnxruntime-armv7-${{ github.run_id }}
          path: downloaded-onnxruntime

      - name: Build Sherpa and create release
        shell: bash
        run: |
          chmod +x scripts/build_sherpa_armv7.sh
          scripts/build_sherpa_armv7.sh

      - name: Upload final TV Box package
        uses: actions/upload-artifact@v4
        with:
          name: Music_AI_Custom_ARMv7_Runtime_${{ github.run_number }}
          path: release/Music_AI_Custom_ARMv7_Runtime.zip
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

      - name: Upload build report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Music_AI_ARMv7_Build_Report_${{ github.run_number }}
          path: |
            release/build-report.txt
            release/SHA256SUMS.txt
          if-no-files-found: warn
          retention-days: 7
